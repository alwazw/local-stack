# AEF3 - Autonomous Engineer Framework v3
# Root docker-compose.yml - orchestrates all services
# Usage: docker compose up -d (from project root)
#        docker compose down   (tear down all)

services:
  # =====================
  # AI / ML
  # =====================
  agent-zero:
    image: agent-zero-langgraph:latest
    container_name: agent-zero
    restart: unless-stopped
    profiles: [ai]
    environment:
      LLM_PROVIDER: "openai"
      LLM_BASE_URL: "http://litellm:4000"
      LLM_MODEL: "ollama/llama3.1:8b"
      QDRANT_HOST: "qdrant"
      QDRANT_PORT: "${PORT_QDRANT}"
      WORK_DIR: /app/work_dir
      PYTHONPATH: /app
      AUDIT_DIR: /app/audit
      MEMORY_DIR: /app/data/memory
      MCP_BASE_URL: "http://mcpo:8000"
      SSH_KEY_PATH: "/run/secrets/ssh_deploy_key"
      SSH_USER: "deploy"
      LITELLM_MASTER_KEY_FILE: "/run/secrets/litellm_key"
    volumes:
      - ./compose/ai/agent-zero/data:/app/data
      - ./compose/ai/agent-zero/work_dir:/app/work_dir
      - ./projects:/app/projects
      - ./agents/qwen:/app/audit
    ports:
      - "127.0.0.1:${PORT_AGENTZERO}:80"
      - "127.0.0.1:${PORT_AGENTZERO_API:-8081}:8080"
    networks:
      - ai-ml
      - agent-communication
    secrets:
      - litellm_key
      - ssh_deploy_key
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=Agent-Zero"
      - "homepage.icon=agent-zero.png"
      - "homepage.href=http://${DOMAIN}:${PORT_AGENTZERO}"
      - "homepage.description=Orchestrator for AI Subagents (Coder, Researcher)"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    profiles: [ai]
    environment:
      LITELLM_MODEL: "ollama/llama3.1:8b"
      OLLAMA_API_BASE: "http://ollama:11434"
      LITELLM_MASTER_KEY_FILE: "/run/secrets/litellm_key"
      DEBUG: 1
    ports:
      - "127.0.0.1:${PORT_LITELLM}:4000"
    volumes:
      - ./compose/ai/litellm/config:/app/config
    networks:
      - proxy
      - ai-ml
    secrets:
      - litellm_key
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=LiteLLM"
      - "homepage.icon=litellm.png"
      - "homepage.href=http://${DOMAIN}:${PORT_LITELLM}/health"
      - "homepage.description=LLM Gateway (Routing, Load Balancing, Fallback)"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/routes', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mcpo:
    image: ghcr.io/open-webui/mcpo:latest
    container_name: mcpo
    restart: unless-stopped
    profiles: [ai]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--config"
      - "/app/config.json"
      - "--hot-reload"
    volumes:
      - ./compose/ai/mcpo/config.json:/app/config.json:ro
      - ./compose/ai/mcpo/filesystem_server.py:/app/filesystem_server.py:ro
      - ./projects:/workspace
    ports:
      - "127.0.0.1:${PORT_MCPO}:8000"
    networks:
      - ai-ml
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=MCPO"
      - "homepage.icon=mcpo.png"
      - "homepage.href=http://${DOMAIN}:${PORT_MCPO}/docs"
      - "homepage.description=MCP-to-OpenAPI Bridge"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    profiles: [ai]
    volumes:
      - ./compose/ai/ollama/models:/root/.ollama
    ports:
      - "127.0.0.1:${PORT_OLLAMA}:11434"
    networks:
      - ai-ml
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/11434"]
      interval: 60s
      start_period: 60s
    labels:
      - "homepage.group=AI"
      - "homepage.name=Ollama"
      - "homepage.icon=ollama.png"

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    profiles: [ai]
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY_FILE: /run/secrets/webui_secret_key
    ports:
      - "127.0.0.1:${PORT_OPENWEBUI}:8080"
    volumes:
      - ./compose/ai/openwebui/data:/app/backend/data
    secrets:
      - webui_secret_key
    networks:
      - proxy
      - ai-ml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`chat.${DOMAIN}`)"
      - "traefik.http.routers.openwebui.entrypoints=websecure"
      - "traefik.http.routers.openwebui.tls.certresolver=cloudflare"
      - "homepage.group=AI"
      - "homepage.name=OpenWebUI"
      - "homepage.href=https://chat.${DOMAIN}"

  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    command: gateway run
    restart: unless-stopped
    profiles: [ai]
    stdin_open: true
    tty: true
    environment:
      HERMES_HOME: /home/hermes/.hermes
      HERMES_UID: "1000"
      HERMES_GID: "1000"
      GATEWAY_ALLOW_ALL_USERS: "true"
      HERMES_DASHBOARD_INSECURE: "1"
    volumes:
      - hermes_home:/home/hermes/.hermes
      - hermes_agent_src:/opt/hermes
    networks:
      - ai-ml
      - agent-communication
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /home/hermes/.hermes/gateway_state.json && python3 -c \"import json; d=json.load(open('/home/hermes/.hermes/gateway_state.json')); exit(0 if d.get('gateway_state')=='running' else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  hermes:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes
    restart: unless-stopped
    profiles: [ai]
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["/hermeswebui_init.bash"]
    depends_on:
      - hermes-agent
    environment:
      HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
      HERMES_WEBUI_HOST: "0.0.0.0"
      HERMES_WEBUI_PORT: "8787"
      WANTED_UID: "1000"
      WANTED_GID: "1000"
      HERMES_AGENT_HOST: "hermes-agent"
    volumes:
      - hermes_home:/home/hermeswebui/.hermes
      - hermes_agent_src:/home/hermeswebui/.hermes/hermes-agent:ro
      - hermes_workspace:/workspace
      - ./compose/ai/hermes/entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    ports:
      - "127.0.0.1:${PORT_HERMES}:8787"
    networks:
      - proxy
      - ai-ml
      - agent-communication
    secrets:
      - hermes_password
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=Hermes"
      - "homepage.icon=hermes.png"
      - "homepage.href=http://localhost:${PORT_HERMES}"
      - "homepage.description=Self-hosted AI Agent with Memory & Tools"
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`hermes.${DOMAIN}`)"
      - "traefik.http.routers.hermes.entrypoints=websecure"
      - "traefik.http.routers.hermes.tls.certresolver=cloudflare"
      - "traefik.http.services.hermes.loadbalancer.server.port=8787"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    profiles: [ai]
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["node", "dev/run-standalone.mjs"]
    depends_on:
      - redis
    environment:
      PORT: "${PORT_OMNIROUTE}"
      REQUIRE_API_KEY: "false"
      DATA_DIR: /app/data
    volumes:
      - omniroute_data:/app/data
      - ./compose/ai/omniroute/entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    ports:
      - "127.0.0.1:${PORT_OMNIROUTE}:20128"
    networks:
      - proxy
      - ai-ml
      - database
    secrets:
      - redis_password
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=Omniroute"
      - "homepage.icon=omniroute.png"
      - "homepage.href=http://localhost:${PORT_OMNIROUTE}"
      - "homepage.description=AI Gateway & Smart Router (177+ Providers)"
      - "traefik.enable=true"
      - "traefik.http.routers.omniroute.rule=Host(`omniroute.${DOMAIN}`)"
      - "traefik.http.routers.omniroute.entrypoints=websecure"
      - "traefik.http.routers.omniroute.tls.certresolver=cloudflare"
      - "traefik.http.services.omniroute.loadbalancer.server.port=20128"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/20128"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =====================
  # Data
  # =====================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./compose/data/postgres/data:/var/lib/postgresql/data
      - ./compose/data/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${PORT_POSTGRES}:5432"
    networks:
      - database
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "homepage.group=Data"
      - "homepage.name=PostgreSQL"
      - "homepage.icon=postgresql.png"
      - "homepage.href=http://postgres:${PORT_POSTGRES}"
      - "homepage.description=Primary database"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        redis-server \
          --requirepass "$$(cat /run/secrets/redis_password)" \
          --appendonly yes
    ports:
      - "127.0.0.1:${PORT_REDIS}:6379"
    volumes:
      - ./compose/data/redis/data:/data
    networks:
      - database
    secrets:
      - redis_password
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a $$(cat /run/secrets/redis_password) ping"]
      interval: 30s

  # =====================
  # Network
  # =====================
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    profiles: [ai]
    entrypoint: ["/entrypoint-wrapper.sh"]
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --ping=true
      - --ping.entrypoint=ping
      - --entrypoints.ping.address=:8080
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.email=wafic@wazzan.us
      - --certificatesresolvers.cloudflare.acme.storage=/data/acme.json
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "0.0.0.0:${PORT_TRAEFIK_HTTP}:80"
      - "0.0.0.0:${PORT_TRAEFIK_HTTPS}:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./compose/network/traefik/data:/data
      - ./compose/network/traefik/entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    secrets:
      - cf_api_email
      - cf_dns_api_token
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik.service=api@internal"
      - "homepage.group=Network"
      - "homepage.name=Traefik"
      - "homepage.icon=traefik.png"
      - "homepage.href=https://traefik.${DOMAIN}"

  cloudflared:
    image: busybox:1.37
    container_name: cloudflared
    restart: unless-stopped
    profiles: [network]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        TOKEN=$$(cat /run/secrets/cf_tunnel_token)
        exec /usr/local/bin/cloudflared tunnel --no-autoupdate run --token "$$TOKEN"
    volumes:
      - cloudflared_bin:/usr/local/bin
    networks:
      - proxy
    secrets:
      - cf_tunnel_token
    depends_on:
      cloudflared-installer:
        condition: service_completed_successfully

  cloudflared-installer:
    image: alpine:latest
    container_name: cloudflared-installer
    profiles: [network]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache curl && \
        curl -fSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /data/cloudflared && \
        chmod +x /data/cloudflared
    volumes:
      - cloudflared_bin:/data

  # =====================
  # Security
  # =====================
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.10.1
    container_name: authentik-server
    restart: unless-stopped
    profiles: [security]
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["dumb-init", "--", "ak", "server"]
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__NAME: authentik
    ports:
      - "127.0.0.1:${PORT_AUTHENTIK}:9000"
    volumes:
      - authentik_media:/media
      - ./compose/security/authentik/custom-templates:/templates
      - ./compose/security/authentik/entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    networks:
      - proxy
      - database
      - security
    secrets:
      - authentik_secret
      - redis_password
      - postgres_password
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.10.1
    container_name: authentik-worker
    restart: unless-stopped
    profiles: [security]
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["dumb-init", "--", "ak", "worker"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__NAME: authentik
    networks:
      - database
      - security
    secrets:
      - authentik_secret
      - redis_password
      - postgres_password
    volumes:
      - ./compose/security/authentik/entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    profiles: [security]
    environment:
      DOMAIN: ${VW_DOMAIN}
      ADMIN_TOKEN_FILE: /run/secrets/vw_admin_token
      SIGNUPS_ALLOWED: "true"
      WEBSOCKET_ENABLED: true
    ports:
      - "127.0.0.1:${PORT_VAULTWARDEN}:80"
    volumes:
      - ./compose/security/vaultwarden/data:/data
    networks:
      - proxy
      - security
    secrets:
      - vw_admin_token
    labels:
      - "homepage.group=Security"
      - "homepage.name=Vaultwarden"
      - "homepage.icon=vaultwarden.png"
      - "homepage.href=https://vault.${DOMAIN}"
      - "homepage.description=Password/Passkey Manager"
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vault.${DOMAIN}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls.certresolver=cloudflare"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      - "traefik.http.routers.vaultwarden-ws.rule=Host(`vault.${DOMAIN}`) && Path(`/notifications/hub`)"
      - "traefik.http.routers.vaultwarden-ws.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden-ws.service=vaultwarden"
      - "traefik.http.routers.vaultwarden-ws.tls.certresolver=cloudflare"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =====================
  # Monitoring
  # =====================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    profiles: [monitoring]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./compose/monitoring/prometheus/data:/prometheus
      - ./compose/monitoring/prometheus/config:/etc/prometheus
    ports:
      - "127.0.0.1:${PORT_PROMETHEUS}:9090"
    networks:
      - monitoring
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Prometheus"
      - "homepage.icon=prometheus.png"
      - "homepage.href=http://${DOMAIN}:${PORT_PROMETHEUS}"
      - "homepage.description=Metrics collection and alerting"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:${PORT_GRAFANA}"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${PORT_GRAFANA}:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Grafana"
      - "homepage.icon=grafana.png"
      - "homepage.href=http://${DOMAIN}:${PORT_GRAFANA}"
      - "homepage.description=Metrics visualization and dashboards"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    profiles: [monitoring]
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:${PORT_UPTIME}:3001"
    networks:
      - monitoring
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Uptime Kuma"
      - "homepage.icon=uptime-kuma.png"
      - "homepage.href=http://${DOMAIN}:${PORT_UPTIME}"
      - "homepage.description=Uptime monitoring and status pages"
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:3001/api/entry-page"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =====================
  # AI — Additional
  # =====================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    profiles: [ai]
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:${PORT_QDRANT:-6333}:6333"
    networks:
      - ai-ml
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "homepage.group=AI"
      - "homepage.name=Qdrant"
      - "homepage.icon=qdrant.png"
      - "homepage.href=http://localhost:${PORT_QDRANT:-6333}/dashboard"
      - "homepage.description=Vector Database for embeddings"

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    profiles: [ai]
    environment:
      SEARXNG_BASE_URL: "http://searxng:8080/"
      SEARXNG_SECRET_KEY_FILE: /run/secrets/webui_secret_key
    volumes:
      - ./compose/ai/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./compose/ai/searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    networks:
      - proxy
      - ai-ml
    secrets:
      - webui_secret_key
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.searxng.rule=Host(`search.${DOMAIN}`)"
      - "traefik.http.routers.searxng.entrypoints=websecure"
      - "traefik.http.routers.searxng.tls.certresolver=cloudflare"
      - "traefik.http.services.searxng.loadbalancer.server.port=8080"
      - "homepage.group=AI"
      - "homepage.name=SearXNG"
      - "homepage.icon=searxng.png"
      - "homepage.href=https://search.${DOMAIN}"
      - "homepage.description=Privacy-respecting metasearch"

  # =====================
  # Productivity
  # =====================
  guacd:
    image: guacamole/guacd:latest
    container_name: guacd
    restart: unless-stopped
    profiles: [productivity]
    volumes:
      - guacd_drive:/drive:rw
      - guacd_record:/record:rw
    networks:
      - ai-ml

  guacamole:
    image: guacamole/guacamole:latest
    container_name: guacamole
    restart: unless-stopped
    profiles: [productivity]
    depends_on:
      - guacd
      - postgres
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: postgres
      POSTGRESQL_DATABASE: guacamole
      POSTGRESQL_USER: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
      - guac_admin_pass
    networks:
      - proxy
      - ai-ml
      - database
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/guacamole"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.guacamole.rule=Host(`rdp.${DOMAIN}`)"
      - "traefik.http.routers.guacamole.entrypoints=websecure"
      - "traefik.http.routers.guacamole.tls.certresolver=cloudflare"
      - "traefik.http.services.guacamole.loadbalancer.server.port=8080"
      - "homepage.group=Productivity"
      - "homepage.name=Guacamole"
      - "homepage.icon=guacamole.png"
      - "homepage.href=https://rdp.${DOMAIN}"
      - "homepage.description=Remote desktop gateway (RDP/VNC/SSH)"

  # =====================
  # CI/CD
  # =====================
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    profiles: [ci]
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: ${POSTGRES_USER}
      GITEA__database__PASSWD_FILE: /run/secrets/postgres_password
      GITEA__server__DOMAIN: "gitea.${DOMAIN}"
      GITEA__server__ROOT_URL: "https://gitea.${DOMAIN}/"
      GITEA__server__HTTP_PORT: 3000
      GITEA__security__SECRET_KEY_FILE: /run/secrets/gitea_secret
    volumes:
      - gitea_data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "127.0.0.1:${PORT_GITEA:-3001}:3000"
      - "127.0.0.1:2222:22"
    networks:
      - proxy
      - database
    secrets:
      - postgres_password
      - gitea_secret
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gitea.rule=Host(`gitea.${DOMAIN}`)"
      - "traefik.http.routers.gitea.entrypoints=websecure"
      - "traefik.http.routers.gitea.tls.certresolver=cloudflare"
      - "traefik.http.services.gitea.loadbalancer.server.port=3000"
      - "homepage.group=CI/CD"
      - "homepage.name=Gitea"
      - "homepage.icon=gitea.png"
      - "homepage.href=https://gitea.${DOMAIN}"
      - "homepage.description=Self-hosted Git service"

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    profiles: [ci]
    environment:
      N8N_HOST: "n8n.${DOMAIN}"
      N8N_PORT: "5678"
      N8N_PROTOCOL: "https"
      N8N_EDITOR_BASE_URL: "https://n8n.${DOMAIN}/"
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_key
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:${PORT_N8N:-5678}:5678"
    networks:
      - proxy
      - database
    secrets:
      - n8n_key
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=cloudflare"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "homepage.group=CI/CD"
      - "homepage.name=n8n"
      - "homepage.icon=n8n.png"
      - "homepage.href=https://n8n.${DOMAIN}"
      - "homepage.description=Workflow automation platform"

  # =====================
  # Monitoring — Additional
  # =====================
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    profiles: [monitoring]
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./compose/monitoring/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:${PORT_LOKI:-3100}:3100"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3100 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Loki"
      - "homepage.icon=grafana.png"
      - "homepage.href=http://localhost:${PORT_LOKI:-3100}"
      - "homepage.description=Log aggregation system"

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    profiles: [monitoring]
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./compose/monitoring/promtail/config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    depends_on:
      - loki

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    profiles: [monitoring]
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cadvisor.rule=Host(`cadvisor.${DOMAIN}`)"
      - "traefik.http.routers.cadvisor.entrypoints=websecure"
      - "traefik.http.routers.cadvisor.tls.certresolver=cloudflare"
      - "traefik.http.services.cadvisor.loadbalancer.server.port=8080"
      - "homepage.group=Monitoring"
      - "homepage.name=cAdvisor"
      - "homepage.icon=docker.png"
      - "homepage.href=https://cadvisor.${DOMAIN}"
      - "homepage.description=Container resource monitoring"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    profiles: [monitoring]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dozzle.rule=Host(`logs.${DOMAIN}`)"
      - "traefik.http.routers.dozzle.entrypoints=websecure"
      - "traefik.http.routers.dozzle.tls.certresolver=cloudflare"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"
      - "homepage.group=Monitoring"
      - "homepage.name=Dozzle"
      - "homepage.icon=dozzle.png"
      - "homepage.href=https://logs.${DOMAIN}"
      - "homepage.description=Real-time Docker log viewer"

  # =====================
  # Management
  # =====================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    profiles: [management]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    ports:
      - "0.0.0.0:8000:8000"
      - "127.0.0.1:${PORT_PORTAINER:-9443}:9443"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=cloudflare"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"
      - "homepage.group=Management"
      - "homepage.name=Portainer"
      - "homepage.icon=portainer.png"
      - "homepage.href=https://portainer.${DOMAIN}"
      - "homepage.description=Docker container management"

  dockge:
    image: louislam/dockge:latest
    container_name: dockge
    restart: unless-stopped
    profiles: [management]
    environment:
      DOCKGE_STACKS_DIR: /opt/stacks
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dockge_data:/app/data
    ports:
      - "127.0.0.1:${PORT_DOCKGE:-5001}:5001"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dockge.rule=Host(`dockge.${DOMAIN}`)"
      - "traefik.http.routers.dockge.entrypoints=websecure"
      - "traefik.http.routers.dockge.tls.certresolver=cloudflare"
      - "traefik.http.services.dockge.loadbalancer.server.port=5001"
      - "homepage.group=Management"
      - "homepage.name=Dockge"
      - "homepage.icon=dockge.png"
      - "homepage.href=https://dockge.${DOMAIN}"
      - "homepage.description=Docker Compose management UI"

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    profiles: [management]
    environment:
      - LOG_LEVEL=info
    volumes:
      - ./compose/management/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:${PORT_HOMEPAGE:-3004}:3000"
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`home.${DOMAIN}`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls.certresolver=cloudflare"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"
      - "homepage.group=Management"
      - "homepage.name=Homepage"
      - "homepage.icon=homepage.png"
      - "homepage.href=https://home.${DOMAIN}"
      - "homepage.description=Application dashboard"

# =====================
# Network definitions
# =====================
networks:
  proxy:
    external: true
  database:
    external: true
  ai-ml:
    external: true
  agent-communication:
    external: true
  security:
    external: true
  monitoring:
    external: true

# =====================
# Named volumes
# =====================
volumes:
  authentik_media:
  hermes_home:
  hermes_agent_src:
  hermes_workspace:
  omniroute_data:
  grafana_data:
  uptime_kuma_data:
  qdrant_data:
  guacd_drive:
  guacd_record:
  gitea_data:
  n8n_data:
  loki_data:
  portainer_data:
  dockge_data:
  cloudflared_bin:

# =====================
# Secrets — ALL secrets mounted as files, NEVER in .env or environment variables
# Pattern: file: ./secrets/<name>.txt → mounted at /run/secrets/<name>
# Services read secrets via:
#   - _FILE env var (Postgres, Redis, Vaultwarden, etc.)
#   - Entrypoint wrapper script (Traefik, Cloudflared)
# =====================
secrets:
  # Cloudflare — Traefik DNS challenge + Tunnel
  cf_api_email:
    file: ./secrets/cf_api_email.txt
  cf_dns_api_token:
    file: ./secrets/cf_dns_api_token.txt
  cf_api_key:
    file: ./secrets/cf_api_key.txt
  cf_tunnel_token:
    file: ./secrets/cf_tunnel_token.txt

  # Authentication & API keys
  authentik_secret:
    file: ./secrets/authentik_secret.txt
  hermes_password:
    file: ./secrets/hermes_password.txt
  github_token:
    file: ./secrets/github_token.txt
  agent_zero_key:
    file: ./secrets/agent_zero_key.txt

  # Application secrets
  gitea_secret:
    file: ./secrets/gitea_secret.txt
  guac_admin_pass:
    file: ./secrets/guac_admin_pass.txt
  litellm_key:
    file: ./secrets/litellm_key.txt
  n8n_key:
    file: ./secrets/n8n_key.txt
  webui_secret_key:
    file: ./secrets/open_web_ui.txt
  vw_admin_token:
    file: ./secrets/vw_admin_token.txt

  # Database credentials
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt

  # SSH deploy key
  ssh_deploy_key:
    file: ./secrets/ssh_deploy_key
