# AEF3 - Autonomous Engineer Framework v3
# Root docker-compose.yml - orchestrates all services
# Usage: docker compose up -d (from project root)
#        docker compose down   (tear down all)

services:
  # =====================
  # AI / ML
  # =====================
  agent-zero:
    image: frdel/agent-zero:latest
    container_name: agent-zero
    restart: unless-stopped
    env_file: [.env]
    profiles: [ai]
    environment:
      LLM_PROVIDER: "openai"
      LLM_BASE_URL: "http://litellm:4000"
      LLM_MODEL: "ollama/llama3.1:8b"
      QDRANT_HOST: "qdrant"
      QDRANT_PORT: "${PORT_QDRANT}"
      WORK_DIR: /app/work_dir
    volumes:
      - ./compose/ai/agent-zero/data:/app/data
      - ./compose/ai/agent-zero/work_dir:/app/work_dir
    ports:
      - "127.0.0.1:${PORT_AGENTZERO}:80"
    networks:
      - ai-ml
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=Agent-Zero"
      - "homepage.icon=agent-zero.png"
      - "homepage.href=http://${DOMAIN}:${PORT_AGENTZERO}"
      - "homepage.description=Orchestrator for AI Subagents (Coder, Researcher)"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    env_file: [.env]
    profiles: [ai]
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY_FILE}"
      LITELLM_MODEL: "ollama/llama3.1:8b"
      OLLAMA_API_BASE: "http://ollama:11434"
      DEBUG: 1
    ports:
      - "127.0.0.1:${PORT_LITELLM}:4000"
    volumes:
      - ./compose/ai/litellm/config:/app/config
    networks:
      - proxy
      - ai-ml
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=LiteLLM"
      - "homepage.icon=litellm.png"
      - "homepage.href=http://${DOMAIN}:${PORT_LITELLM}/health"
      - "homepage.description=LLM Gateway (Routing, Load Balancing, Fallback)"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/routes', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mcpo:
    image: ghcr.io/open-webui/mcpo:latest
    container_name: mcpo
    restart: unless-stopped
    profiles: [ai]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--"
      - "python3"
      - "-c"
      - "from mcp.server.fastmcp import FastMCP; mcp = FastMCP('aef3-tools'); mcp.run()"
    ports:
      - "127.0.0.1:${PORT_MCPO}:8000"
    networks:
      - ai-ml
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=MCPO"
      - "homepage.icon=mcpo.png"
      - "homepage.href=http://${DOMAIN}:${PORT_MCPO}/docs"
      - "homepage.description=MCP-to-OpenAPI Bridge"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    env_file: [.env]
    profiles: [ai]
    volumes:
      - ./compose/ai/ollama/models:/root/.ollama
    ports:
      - "127.0.0.1:${PORT_OLLAMA}:11434"
    networks:
      - ai-ml
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/11434"]
      interval: 60s
      start_period: 60s
    labels:
      - "homepage.group=AI"
      - "homepage.name=Ollama"
      - "homepage.icon=ollama.png"

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    env_file: [.env]
    profiles: [ai]
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY_FILE: "${WEBUI_SECRET_KEY_FILE}"
    ports:
      - "127.0.0.1:${PORT_OPENWEBUI}:8080"
    volumes:
      - ./compose/ai/openwebui/data:/app/backend/data
    secrets:
      - webui_secret_key
    networks:
      - proxy
      - ai-ml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`chat.${DOMAIN}`)"
      - "traefik.http.routers.openwebui.entrypoints=websecure"
      - "traefik.http.routers.openwebui.tls.certresolver=cloudflare"
      - "homepage.group=AI"
      - "homepage.name=OpenWebUI"
      - "homepage.href=https://chat.${DOMAIN}"

  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    command: gateway run
    restart: unless-stopped
    env_file: [.env]
    profiles: [ai]
    stdin_open: true
    tty: true
    environment:
      HERMES_HOME: /home/hermes/.hermes
      HERMES_UID: "1000"
      HERMES_GID: "1000"
      GATEWAY_ALLOW_ALL_USERS: "true"
      HERMES_DASHBOARD_INSECURE: "1"
    volumes:
      - hermes_home:/home/hermes/.hermes
      - hermes_agent_src:/opt/hermes
    networks:
      - ai-ml
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /home/hermes/.hermes/gateway_state.json && python3 -c \"import json; d=json.load(open('/home/hermes/.hermes/gateway_state.json')); exit(0 if d.get('gateway_state')=='running' else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  hermes:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes
    restart: unless-stopped
    env_file: [.env]
    profiles: [ai]
    depends_on:
      - hermes-agent
    environment:
      HERMES_WEBUI_PASSWORD: ${HERMES_WEBUI_PASSWORD}
      HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
      HERMES_WEBUI_HOST: "0.0.0.0"
      HERMES_WEBUI_PORT: "8787"
      WANTED_UID: "1000"
      WANTED_GID: "1000"
      HERMES_AGENT_HOST: "hermes-agent"
    volumes:
      - hermes_home:/home/hermeswebui/.hermes
      - hermes_agent_src:/home/hermeswebui/.hermes/hermes-agent:ro
      - hermes_workspace:/workspace
    ports:
      - "127.0.0.1:${PORT_HERMES}:8787"
    networks:
      - proxy
      - ai-ml
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=Hermes"
      - "homepage.icon=hermes.png"
      - "homepage.href=http://localhost:${PORT_HERMES}"
      - "homepage.description=Self-hosted AI Agent with Memory & Tools"
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`hermes.${DOMAIN}`)"
      - "traefik.http.routers.hermes.entrypoints=websecure"
      - "traefik.http.routers.hermes.tls.certresolver=cloudflare"
      - "traefik.http.services.hermes.loadbalancer.server.port=8787"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  omniroute:
    image: diegosouzapw/omniroute:latest
    container_name: omniroute
    restart: unless-stopped
    env_file: [.env]
    profiles: [ai]
    depends_on:
      - redis
    environment:
      PORT: "${PORT_OMNIROUTE}"
      REQUIRE_API_KEY: "false"
      DATA_DIR: /app/data
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
    volumes:
      - omniroute_data:/app/data
    ports:
      - "127.0.0.1:${PORT_OMNIROUTE}:20128"
    networks:
      - proxy
      - ai-ml
      - database
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=Omniroute"
      - "homepage.icon=omniroute.png"
      - "homepage.href=http://localhost:${PORT_OMNIROUTE}"
      - "homepage.description=AI Gateway & Smart Router (177+ Providers)"
      - "traefik.enable=true"
      - "traefik.http.routers.omniroute.rule=Host(`omniroute.${DOMAIN}`)"
      - "traefik.http.routers.omniroute.entrypoints=websecure"
      - "traefik.http.routers.omniroute.tls.certresolver=cloudflare"
      - "traefik.http.services.omniroute.loadbalancer.server.port=20128"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/20128"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =====================
  # Data
  # =====================
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./compose/data/postgres/data:/var/lib/postgresql/data
      - ./compose/data/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:${PORT_POSTGRES}:5432"
    networks:
      - database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "homepage.group=Data"
      - "homepage.name=PostgreSQL"
      - "homepage.icon=postgresql.png"
      - "homepage.href=http://postgres:${PORT_POSTGRES}"
      - "homepage.description=Primary database"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
    ports:
      - "127.0.0.1:${PORT_REDIS}:6379"
    volumes:
      - ./compose/data/redis/data:/data
    networks:
      - database
    healthcheck:
      test: ["CMD", "sh", "-c", "redis-cli -a '${REDIS_PASSWORD}' ping"]
      interval: 30s

  # =====================
  # Network
  # =====================
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    env_file: [.env]
    command:
      - --api.dashboard=true
      - --api.insecure=false
      - --ping=true
      - --ping.entrypoint=ping
      - --entrypoints.ping.address=:8080
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=proxy
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge=true
      - --certificatesresolvers.cloudflare.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.cloudflare.acme.email=${CF_API_EMAIL}
      - --certificatesresolvers.cloudflare.acme.storage=/data/acme.json
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "0.0.0.0:${PORT_TRAEFIK_HTTP}:80"
      - "0.0.0.0:${PORT_TRAEFIK_HTTPS}:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./compose/network/traefik/data:/data
    networks:
      - proxy
    environment:
      CF_API_EMAIL: ${CF_API_EMAIL}
      CF_DNS_API_TOKEN: ${CF_DNS_API_TOKEN}
      CF_API_KEY: ${CF_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      interval: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.traefik.entrypoints=websecure"
      - "traefik.http.routers.traefik.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.middlewares=authentik@docker"
      - "homepage.group=Network"
      - "homepage.name=Traefik"
      - "homepage.icon=traefik.png"
      - "homepage.href=https://traefik.${DOMAIN}"

  # =====================
  # Security
  # =====================
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.10.1
    container_name: authentik-server
    restart: unless-stopped
    env_file: [.env]
    profiles: [security]
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
    ports:
      - "127.0.0.1:${PORT_AUTHENTIK}:9000"
    volumes:
      - authentik_media:/media
      - ./compose/security/authentik/custom-templates:/templates
    networks:
      - proxy
      - database
      - security
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.10.1
    container_name: authentik-worker
    restart: unless-stopped
    env_file: [.env]
    profiles: [security]
    command: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
    networks:
      - database
      - security

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    env_file: [.env]
    profiles: [security]
    environment:
      DOMAIN: ${VW_DOMAIN}
      ADMIN_TOKEN_FILE: /run/secrets/vw_admin_token
      SIGNUPS_ALLOWED: "true"
      WEBSOCKET_ENABLED: true
    ports:
      - "127.0.0.1:${PORT_VAULTWARDEN}:80"
    volumes:
      - ./compose/security/vaultwarden/data:/data
    networks:
      - proxy
      - security
    secrets:
      - vw_admin_token
    labels:
      - "homepage.group=Security"
      - "homepage.name=Vaultwarden"
      - "homepage.icon=vaultwarden.png"
      - "homepage.href=https://vault.${DOMAIN}"
      - "homepage.description=Password/Passkey Manager"
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden.rule=Host(`vault.${DOMAIN}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden.tls.certresolver=cloudflare"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"
      - "traefik.http.routers.vaultwarden-ws.rule=Host(`vault.${DOMAIN}`) && Path(`/notifications/hub`)"
      - "traefik.http.routers.vaultwarden-ws.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden-ws.service=vaultwarden"
      - "traefik.http.routers.vaultwarden-ws.tls.certresolver=cloudflare"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/alive"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # =====================
  # Monitoring
  # =====================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    profiles: [monitoring]
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./compose/monitoring/prometheus/data:/prometheus
      - ./compose/monitoring/prometheus/config:/etc/prometheus
    ports:
      - "127.0.0.1:${PORT_PROMETHEUS}:9090"
    networks:
      - monitoring
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Prometheus"
      - "homepage.icon=prometheus.png"
      - "homepage.href=http://${DOMAIN}:${PORT_PROMETHEUS}"
      - "homepage.description=Metrics collection and alerting"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:${PORT_GRAFANA}"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${PORT_GRAFANA}:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Grafana"
      - "homepage.icon=grafana.png"
      - "homepage.href=http://${DOMAIN}:${PORT_GRAFANA}"
      - "homepage.description=Metrics visualization and dashboards"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    profiles: [monitoring]
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:${PORT_UPTIME}:3001"
    networks:
      - monitoring
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Uptime Kuma"
      - "homepage.icon=uptime-kuma.png"
      - "homepage.href=http://${DOMAIN}:${PORT_UPTIME}"
      - "homepage.description=Uptime monitoring and status pages"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/entry-page"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# =====================
# Network definitions
# =====================
networks:
  proxy:
    external: true
  database:
    external: true
  ai-ml:
    external: true
  security:
    external: true
  monitoring:
    external: true

# =====================
# Named volumes
# =====================
volumes:
  authentik_media:
  hermes_home:
  hermes_agent_src:
  hermes_workspace:
  omniroute_data:
  grafana_data:
  uptime_kuma_data:

# =====================
# Secrets
# =====================
secrets:
  vw_admin_token:
    file: ./secrets/vw_admin_token.txt
  webui_secret_key:
    file: ./secrets/open_web_ui.txt
