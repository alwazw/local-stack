services:
  affine:
    command:
    - node
    - ./dist/main.js
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    entrypoint:
    - /entrypoint-wrapper.sh
    environment:
      AFFINE_INDEXER_ENABLED: 'false'
      NODE_ENV: production
      REDIS_SERVER_HOST: redis
    image: ghcr.io/toeverything/affine:stable
    networks:
      database:
      proxy:
    ports:
    - mode: ingress
      target: 3010
      published: 8083
      protocol: tcp
    volumes:
    - type: volume
      source: affine_data
      target: /root/.affine
      volume: {}
    - type: bind
      source: /mnt/d/docker/compose/productivity/affine/entrypoint-wrapper.sh
      target: /entrypoint-wrapper.sh
      read_only: true
      bind: {}
    - type: bind
      source: /mnt/d/docker/secrets/redis_password.txt
      target: /run/secrets/redis_password
      read_only: true
      bind: {}
    - type: bind
      source: /mnt/d/docker/secrets/affine_database_url.txt
      target: /run/secrets/affine_database_url
      read_only: true
      bind: {}
  agent-zero:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    environment:
      AGENT_ZERO_API_KEY_FILE: /run/secrets/agent_zero_key
      AUDIT_DIR: /app/audit
      LITELLM_MASTER_KEY_FILE: /run/secrets/litellm_key
      LLM_BASE_URL: http://litellm:4000
      LLM_EMBEDDING_MODEL: openai/morpheus-embedding-model
      LLM_MODEL: openai/morpheus-main-model
      LLM_PROVIDER: openai
      LLM_UTILITY_MODEL: openai/morpheus-utility-model
      MCP_BASE_URL: http://mcpo:8000
      MEMORY_DIR: /app/data/memory
      PYTHONPATH: /app
      QDRANT_HOST: qdrant
      QDRANT_PORT: '6333'
      SSH_KEY_PATH: /run/secrets/ssh_deploy_key
      SSH_USER: deploy
      WORK_DIR: /app/work_dir
    healthcheck:
      test:
      - CMD
      - python3
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:80/')
      timeout: 10s
      interval: 30s
      retries: 5
      start_period: 1m0s
    image: agent-zero-langgraph:latest
    labels:
      homepage.description: Orchestrator for AI Subagents (Coder, Researcher)
      homepage.group: AI Core
      homepage.href: https://agent-zero.wazzan.us
      homepage.icon: agent-zero.png
      homepage.name: Agent-Zero
      traefik.enable: 'true'
      traefik.http.routers.agent-zero-web.entrypoints: web
      traefik.http.routers.agent-zero-web.rule: Host(`agent-zero.wazzan.us`)
      traefik.http.routers.agent-zero.entrypoints: websecure
      traefik.http.routers.agent-zero.rule: Host(`agent-zero.wazzan.us`)
      traefik.http.routers.agent-zero.tls.certresolver: cloudflare
      traefik.http.services.agent-zero.loadbalancer.server.port: '80'
    networks:
      agent-communication:
      ai-ml:
      proxy:
    ports:
    - mode: ingress
      target: 80
      published: 8501
      protocol: tcp
    - mode: ingress
      target: 8080
      published: 8081
      protocol: tcp
    secrets:
    - source: litellm_key
      target: /run/secrets/litellm_key
    - source: ssh_deploy_key
      target: /run/secrets/ssh_deploy_key
    - source: agent_zero_key
      target: /run/secrets/agent_zero_key
    volumes:
    - type: bind
      source: /mnt/d/docker/compose/ai/agent-zero/data
      target: /app/data
      bind: {}
    - type: bind
      source: /mnt/d/docker/compose/ai/agent-zero/work_dir
      target: /app/work_dir
      bind: {}
    - type: bind
      source: /mnt/d/docker/projects
      target: /app/projects
      bind: {}
    - type: bind
      source: /mnt/d/docker/agents/qwen
      target: /app/audit
      bind: {}
  authentik-server:
    command:
    - dumb-init
    - --
    - ak
    - server
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    entrypoint:
    - /entrypoint-wrapper.sh
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: alwazw
      AUTHENTIK_REDIS__HOST: redis
    image: ghcr.io/goauthentik/server:2024.10.1
    labels:
      homepage.description: Identity provider and SSO
      homepage.group: Security
      homepage.href: https://auth.wazzan.us
      homepage.icon: authentik.png
      homepage.name: Authentik
      traefik.enable: 'true'
      traefik.http.routers.authentik-web.entrypoints: web
      traefik.http.routers.authentik-web.rule: Host(`auth.wazzan.us`) || 
        Host(`app.wazzan.us`)
      traefik.http.routers.authentik.entrypoints: websecure
      traefik.http.routers.authentik.rule: Host(`auth.wazzan.us`) || 
        Host(`app.wazzan.us`)
      traefik.http.routers.authentik.tls.certresolver: cloudflare
      traefik.http.services.authentik.loadbalancer.server.port: '9000'
    networks:
      database:
      proxy:
      security:
    ports:
    - mode: ingress
      target: 9000
      published: 9000
      protocol: tcp
    secrets:
    - source: authentik_secret
      target: /run/secrets/authentik_secret
    - source: redis_password
      target: /run/secrets/redis_password
    - source: postgres_password
      target: /run/secrets/postgres_password
    volumes:
    - type: bind
      source: /mnt/d/docker/compose/security/authentik-server/media
      target: /media
      bind: {}
    - type: bind
      source: /mnt/d/docker/compose/security/authentik-server/custom-templates
      target: /templates
      bind: {}
    - type: bind
      source: 
        /mnt/d/docker/compose/security/authentik-server/entrypoint-wrapper.sh
      target: /entrypoint-wrapper.sh
      read_only: true
      bind: {}
  authentik-worker:
    command:
    - dumb-init
    - --
    - ak
    - worker
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    entrypoint:
    - /entrypoint-wrapper.sh
    image: ghcr.io/goauthentik/server:2024.10.1
    networks:
      default:
  cadvisor:
    deploy:
      mode: global
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    image: gcr.io/cadvisor/cadvisor:latest
    labels:
      homepage.description: Container resource monitoring
      homepage.group: Monitoring
      homepage.href: https://cadvisor.wazzan.us
      homepage.icon: docker.png
      homepage.name: cAdvisor
      traefik.enable: 'true'
      traefik.http.routers.cadvisor-web.entrypoints: web
      traefik.http.routers.cadvisor-web.rule: Host(`cadvisor.wazzan.us`)
      traefik.http.routers.cadvisor.entrypoints: websecure
      traefik.http.routers.cadvisor.rule: Host(`cadvisor.wazzan.us`)
      traefik.http.routers.cadvisor.tls.certresolver: cloudflare
      traefik.http.services.cadvisor.loadbalancer.server.port: '8080'
    networks:
      monitoring:
      proxy:
    volumes:
    - type: bind
      source: /
      target: /rootfs
      read_only: true
      bind: {}
    - type: bind
      source: /var/run
      target: /var/run
      read_only: true
      bind: {}
    - type: bind
      source: /sys
      target: /sys
      read_only: true
      bind: {}
    - type: bind
      source: /var/lib/docker/
      target: /var/lib/docker
      read_only: true
      bind: {}
    - type: bind
      source: /dev/disk/
      target: /dev/disk
      read_only: true
      bind: {}
  cloudflared:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    entrypoint:
    - /bin/sh
    - /entrypoint-wrapper.sh
    environment:
      CLOUDFLARED_VERSION: latest
    image: alpine:latest
    labels:
      homepage.description: Cloudflare tunnel for external access
      homepage.group: Network
      homepage.href: https://dash.cloudflare.com
      homepage.icon: cloudflare.png
      homepage.name: Cloudflare Tunnel
    networks:
      proxy:
    secrets:
    - source: cf_tunnel_token
      target: /run/secrets/cf_tunnel_token
    volumes:
    - type: bind
      source: /mnt/d/docker/compose/network/cloudflared/entrypoint-wrapper.sh
      target: /entrypoint-wrapper.sh
      read_only: true
      bind: {}
    - type: volume
      source: cloudflared_bin
      target: /data
      volume: {}
  dockge:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    environment:
      DOCKGE_STACKS_DIR: /opt/stacks
    image: louislam/dockge:latest
    labels:
      homepage.description: Docker Compose management UI
      homepage.group: Management
      homepage.href: https://dockge.wazzan.us
      homepage.icon: dockge.png
      homepage.name: Dockge
      traefik.enable: 'true'
      traefik.http.routers.dockge-web.entrypoints: web
      traefik.http.routers.dockge-web.rule: Host(`dockge.wazzan.us`)
      traefik.http.routers.dockge.entrypoints: websecure
      traefik.http.routers.dockge.rule: Host(`dockge.wazzan.us`)
      traefik.http.routers.dockge.tls.certresolver: cloudflare
      traefik.http.services.dockge.loadbalancer.server.port: '5001'
    networks:
      proxy:
    ports:
    - mode: ingress
      target: 5001
      published: 5001
      protocol: tcp
    volumes:
    - type: bind
      source: /var/run/docker.sock
      target: /var/run/docker.sock
      read_only: true
      bind: {}
    - type: volume
      source: dockge_data
      target: /app/data
      volume: {}
  dozzle:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    image: amir20/dozzle:latest
    labels:
      homepage.description: Real-time Docker log viewer
      homepage.group: Monitoring
      homepage.href: https://logs.wazzan.us
      homepage.icon: dozzle.png
      homepage.name: Dozzle
      traefik.enable: 'true'
      traefik.http.routers.dozzle-web.entrypoints: web
      traefik.http.routers.dozzle-web.rule: Host(`logs.wazzan.us`)
      traefik.http.routers.dozzle.entrypoints: websecure
      traefik.http.routers.dozzle.rule: Host(`logs.wazzan.us`)
      traefik.http.routers.dozzle.tls.certresolver: cloudflare
      traefik.http.services.dozzle.loadbalancer.server.port: '8080'
    networks:
      proxy:
    volumes:
    - type: bind
      source: /var/run/docker.sock
      target: /var/run/docker.sock
      read_only: true
      bind: {}
  gitea:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    environment:
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__PASSWD_FILE: /run/secrets/postgres_password
      GITEA__database__USER: alwazw
      GITEA__security__SECRET_KEY_FILE: /run/secrets/gitea_secret
      GITEA__server__DOMAIN: gitea.wazzan.us
      GITEA__server__HTTP_PORT: '3000'
      GITEA__server__ROOT_URL: https://gitea.wazzan.us/
      USER_GID: '1000'
      USER_UID: '1000'
    image: gitea/gitea:latest
    networks:
      database:
      proxy:
    ports:
    - mode: ingress
      target: 3000
      published: 3001
      protocol: tcp
    - mode: ingress
      target: 22
      published: 2222
      protocol: tcp
    secrets:
    - source: postgres_password
      target: /run/secrets/postgres_password
    - source: gitea_secret
      target: /run/secrets/gitea_secret
    volumes:
    - type: volume
      source: gitea_data
      target: /data
      volume: {}
    - type: bind
      source: /etc/timezone
      target: /etc/timezone
      read_only: true
      bind: {}
    - type: bind
      source: /etc/localtime
      target: /etc/localtime
      read_only: true
      bind: {}
  grafana:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_SERVER_ROOT_URL: https://grafana.wazzan.us
      GF_USERS_ALLOW_SIGN_UP: 'false'
    image: grafana/grafana:latest
    networks:
      monitoring:
      proxy:
    ports:
    - mode: ingress
      target: 3000
      published: 3003
      protocol: tcp
    volumes:
    - type: bind
      source: /mnt/d/docker/compose/monitoring/grafana/grafana_data
      target: /var/lib/grafana
      bind: {}
  guacamole:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    image: guacamole/guacamole:latest
    networks:
      default:
  guacd:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    image: guacamole/guacd:latest
    networks:
      ai-ml:
      proxy:
    volumes:
    - type: volume
      source: guacd_drive
      target: /drive
      volume: {}
    - type: volume
      source: guacd_record
      target: /record
      volume: {}
  hermes-agent:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    entrypoint:
    - /agent-entrypoint.sh
    environment:
      API_SERVER_ENABLED: 'true'
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: your-super-secret-key-here
      API_SERVER_PORT: '8642'
      GATEWAY_ALLOW_ALL_USERS: 'true'
      HERMES_DASHBOARD_INSECURE: '1'
      HERMES_GID: '1000'
      HERMES_HOME: /home/hermes/.hermes
      HERMES_UID: '1000'
    healthcheck:
      test:
      - CMD
      - sh
      - -c
      - test -f /home/hermes/.hermes/gateway_state.json && python3 -c "import 
        json; d=json.load(open('/home/hermes/.hermes/gateway_state.json')); 
        exit(0 if d.get('gateway_state')=='running' else 1)"
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 1m0s
    image: nousresearch/hermes-agent:latest
    networks:
      agent-communication:
      ai-ml:
      proxy:
    ports:
    - mode: ingress
      target: 8642
      published: 8642
      protocol: tcp
    secrets:
    - source: hermes_password
      target: /run/secrets/hermes_password
    - source: github_token
      target: /run/secrets/github_token
    volumes:
    - type: volume
      source: hermes_home
      target: /home/hermes/.hermes
      volume: {}
    - type: volume
      source: hermes_agent_src
      target: /opt/hermes
      volume: {}
    - type: bind
      source: /mnt/d/docker
      target: /mnt/d/docker
      bind: {}
    - type: bind
      source: /
      target: /host
      bind: {}
    - type: bind
      source: /home/alwazw/.ssh/id_ed25519
      target: /home/hermes/.ssh/id_ed25519
      read_only: true
      bind: {}
    - type: bind
      source: /home/alwazw/.ssh/known_hosts
      target: /home/hermes/.ssh/known_hosts
      read_only: true
      bind: {}
    - type: bind
      source: /home/alwazw/docker/compose/ai/hermes/agent-entrypoint.sh
      target: /agent-entrypoint.sh
      read_only: true
      bind: {}
  hermes-webui:
    command:
    - /hermeswebui_init.bash
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    entrypoint:
    - /entrypoint-wrapper.sh
    image: ghcr.io/nesquena/hermes-webui:latest
    networks:
      default:
  homepage:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    environment:
      HOMEPAGE_ALLOWED_HOSTS: localhost:3004
      LOG_LEVEL: info
    image: ghcr.io/gethomepage/homepage:latest
    labels:
      homepage.description: Application dashboard
      homepage.group: Management
      homepage.href: https://home.wazzan.us
      homepage.icon: homepage.png
      homepage.name: Homepage
      traefik.enable: 'true'
      traefik.http.routers.homepage-web.entrypoints: web
      traefik.http.routers.homepage-web.rule: Host(`home.wazzan.us`)
      traefik.http.routers.homepage.entrypoints: websecure
      traefik.http.routers.homepage.rule: Host(`home.wazzan.us`)
      traefik.http.routers.homepage.tls.certresolver: cloudflare
      traefik.http.services.homepage.loadbalancer.server.port: '3000'
    networks:
      proxy:
    ports:
    - mode: ingress
      target: 3000
      published: 3004
      protocol: tcp
    volumes:
    - type: bind
      source: /mnt/d/docker/compose/management/homepage/config
      target: /app/config
      bind: {}
    - type: bind
      source: /var/run/docker.sock
      target: /var/run/docker.sock
      read_only: true
      bind: {}
  litellm:
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '1073741824'
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 2m0s
    entrypoint:
    - /entrypoint-wrapper.sh
    environment:
      ALIBABA_MODELSTUDIO_KEY_1_FILE: /run/secrets/alibaba_key_1
      ALIBABA_MODELSTUDIO_KEY_2_FILE: /run/secrets/alibaba_key_2
      DATABASE_URL_FILE: /run/secrets/litellm_database_url
      DEBUG: '1'
      GEMINI_API_KEY_1_FILE: /run/secrets/gemini_key_1
      GEMINI_API_KEY_2_FILE: /run/secrets/gemini_key_2
      GEMINI_API_KEY_3_FILE: /run/secrets/gemini_key_3
      GROQ_API_KEY_1_FILE: /run/secrets/grok_key_1
      LITELLM_MASTER_KEY_FILE: /run/secrets/litellm_key
      NOVITA_API_KEY_1_FILE: /run/secrets/novita_key_1
      NVIDIA_NIM_KEY_1_FILE: /run/secrets/nvidia_nim_key_1
      OLLAMA_API_BASE: http://ollama:11434
      OPENROUTER_KEY_1_FILE: /run/secrets/openrouter_key_1
      OPENROUTER_KEY_2_FILE: /run/secrets/openrouter_key_2
      OPENROUTER_KEY_3_FILE: /run/secrets/openrouter_key_3
      STORE_MODEL_IN_DB: 'False'
    healthcheck:
      test:
      - CMD
      - python3
      - -c
      - import urllib.request; 
        urllib.request.urlopen('http://localhost:4000/routes', timeout=5)
      timeout: 10s
      interval: 30s
      retries: 5
      start_period: 30s
    image: ghcr.io/berriai/litellm:main-latest
    labels:
      homepage.description: LLM Gateway (Routing, Load Balancing, Fallback)
      homepage.group: AI Core
      homepage.href: https://litellm.wazzan.us
      homepage.icon: litellm.png
      homepage.name: LiteLLM
      traefik.enable: 'true'
      traefik.http.routers.litellm-web.entrypoints: web
      traefik.http.routers.litellm-web.rule: Host(`litellm.wazzan.us`)
      traefik.http.routers.litellm.entrypoints: websecure
      traefik.http.routers.litellm.rule: Host(`litellm.wazzan.us`)
      traefik.http.routers.litellm.tls.certresolver: cloudflare
      traefik.http.services.litellm.loadbalancer.server.port: '4000'
    networks:
      ai-ml:
      proxy:
    ports:
    - mode: ingress
      target: 4000
      published: 4000
      protocol: tcp
    secrets:
    - source: litellm_key
      target: /run/secrets/litellm_key
    - source: openrouter_key_1
      target: /run/secrets/openrouter_key_1
    - source: openrouter_key_2
      target: /run/secrets/openrouter_key_2
    - source: openrouter_key_3
      target: /run/secrets/openrouter_key_3
    - source: nvidia_nim_key_1
      target: /run/secrets/nvidia_nim_key_1
    - source: gemini_key_1
      target: /run/secrets/gemini_key_1
    - source: gemini_key_2
      target: /run/secrets/gemini_key_2
    - source: gemini_key_3
      target: /run/secrets/gemini_key_3
    - source: grok_key_1
      target: /run/secrets/grok_key_1
    - source: alibaba_key_1
      target: /run/secrets/alibaba_key_1
    - source: alibaba_key_2
      target: /run/secrets/alibaba_key_2
    - source: novita_key_1
      target: /run/secrets/novita_key_1
    volumes:
    - type: bind
      source: /mnt/d/docker/compose/ai/litellm/config
      target: /app/config
      bind: {}
    - type: bind
      source: /mnt/d/docker/compose/ai/litellm/entrypoint-wrapper.sh
      target: /entrypoint-wrapper.sh
      read_only: true
      bind: {}
  loki:
    command:
