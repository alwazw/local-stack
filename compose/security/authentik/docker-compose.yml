services:
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.10.1
    container_name: authentik-server
    restart: unless-stopped
    env_file: [../../../.env]
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__PASSWORD_FILE: /run/secrets/redis_password
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD_FILE: /run/secrets/postgres_password
      AUTHENTIK_SECRET_KEY_FILE: /run/secrets/authentik_secret_key
    volumes:
      - authentik_media:/media
      - ./custom-templates:/templates
    networks:
      - proxy
      - database
      - security
    secrets:
      - redis_password
      - postgres_password
      - authentik_secret_key
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.authentik.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.10.1
    container_name: authentik-worker
    restart: unless-stopped
    env_file: [../../../.env]
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__PASSWORD_FILE: /run/secrets/redis_password
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD_FILE: /run/secrets/postgres_password
      AUTHENTIK_SECRET_KEY_FILE: /run/secrets/authentik_secret_key
    networks:
      - database
      - security
    secrets:
      - redis_password
      - postgres_password
      - authentik_secret_key

networks:
  proxy: {external: true}
  database: {external: true}
  security: {external: true}

volumes:
  authentik_media:

secrets:
  redis_password:
    external: true
  postgres_password:
    external: true
  authentik_secret_key:
    external: true
