# version: "3.8"

services:
  authentik-server:
    image: ghcr.io/goauthentik/server:2024.10.1
    container_name: authentik-server
    restart: unless-stopped
    profiles: [security]
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["dumb-init", "--", "ak", "server"]
    environment:
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER}
      AUTHENTIK_POSTGRESQL__NAME: authentik
#    depends_on:
#      postgres:
#        condition: service_healthy
#      redis:
#        condition: service_healthy
    ports:
      - "127.0.0.1:${PORT_AUTHENTIK}:9000"
    volumes:
      - ./media:/media
      - ./custom-templates:/templates
      - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    networks:
      - proxy
      - database
      - security
    secrets:
      - authentik_secret
      - redis_password
      - postgres_password
    labels:
      - "traefik.enable=true"
      # Matches both the admin setup domain and the clean dashboard domain
      - "traefik.http.routers.authentik.rule=Host(`auth.${DOMAIN}`) || Host(`app.${DOMAIN}`)"
      - "traefik.http.routers.authentik.entrypoints=websecure"
      - "traefik.http.routers.authentik.tls.certresolver=cloudflare"
      - "traefik.http.routers.authentik-web.entrypoints=web"
      - "traefik.http.routers.authentik-web.rule=Host(`auth.${DOMAIN}`) || Host(`app.${DOMAIN}`)"
      - "traefik.http.services.authentik.loadbalancer.server.port=9000"
      - "homepage.group=Security"
      - "homepage.name=Authentik"
      - "homepage.icon=authentik.png"
      - "homepage.href=https://auth.${DOMAIN}"
      - "homepage.description=Identity provider and SSO"
    
    
networks:
  proxy:
    external: true
  database:
    external: true
  security:
    external: true


