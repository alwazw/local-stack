# Affine — Collaborative knowledge base (Notion alternative)
# Profile: productivity
# Network: proxy, database
# Port: 8083
services:
  affine_migration:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine-migration
    profiles: [productivity]
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ['node', './scripts/self-host-predeploy.js']
    environment:
      NODE_ENV: production
      REDIS_SERVER_HOST: redis
      AFFINE_INDEXER_ENABLED: "false"
    volumes:
      - affine_data:/root/.affine
      - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
      - ../../../secrets/redis_password.txt:/run/secrets/redis_password:ro
      - ../../../secrets/affine_database_url.txt:/run/secrets/affine_database_url:ro
    networks:
      - database
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  affine:
    image: ghcr.io/toeverything/affine:stable
    container_name: affine
    restart: unless-stopped
    profiles: [productivity]
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["node", "./dist/main.js"]
    environment:
      NODE_ENV: production
      REDIS_SERVER_HOST: redis
      AFFINE_INDEXER_ENABLED: "false"
    volumes:
      - affine_data:/root/.affine
      - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
      - ../../../secrets/redis_password.txt:/run/secrets/redis_password:ro
      - ../../../secrets/affine_database_url.txt:/run/secrets/affine_database_url:ro
    ports:
      - "127.0.0.1:${PORT_AFFINE:-8083}:3010"
    networks:
      - proxy
      - database
    depends_on:
      affine_migration:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.affine.rule=Host(`affine.${DOMAIN}`)"
      - "traefik.http.routers.affine.entrypoints=websecure"
      - "traefik.http.routers.affine.tls.certresolver=cloudflare"
      - "traefik.http.services.affine.loadbalancer.server.port=3010"
      - "homepage.group=Productivity"
      - "homepage.name=Affine"
      - "homepage.icon=affine.png"
      - "homepage.href=https://affine.${DOMAIN}"
      - "homepage.description=Collaborative knowledge base"

volumes:
  affine_data:
