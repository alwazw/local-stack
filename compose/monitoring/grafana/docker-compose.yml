#version: "3.8"

services:
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    profiles: [monitoring]
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "https://grafana.wazzan.us"
    volumes:
      # FIX: Bind directly to the local directory in your tree
      - ./grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${PORT_GRAFANA}:3000"
    networks:
      - monitoring
      - proxy


# FIX: Removed the bottom volumes block entirely since bind mounts don't need it.