# Loki — Log aggregation system (Grafana datasource)
# Profile: monitoring
# Network: monitoring
# Port: 3100
services:
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    profiles: [monitoring]
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./compose/monitoring/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:${PORT_LOKI:-3100}:3100"
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Loki"
      - "homepage.icon=grafana.png"
      - "homepage.href=http://localhost:${PORT_LOKI:-3100}"
      - "homepage.description=Log aggregation system"
