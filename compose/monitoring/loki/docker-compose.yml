# version: "3.8"

services:
  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    profiles: [monitoring]
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:${PORT_LOKI:-3100}:3100"
    networks:
      - monitoring
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Loki"
      - "homepage.icon=grafana.png"
      - "homepage.href=http://localhost:${PORT_LOKI:-3100}"
      - "homepage.description=Log aggregation system"


