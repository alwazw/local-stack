# version: "3.8"

services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    profiles: [monitoring]
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:${PORT_UPTIME}:3001"
    networks:
      - monitoring
    labels:
      - "homepage.group=Monitoring"
      - "homepage.name=Uptime Kuma"
      - "homepage.icon=uptime-kuma.png"
      - "homepage.href=http://localhost:${PORT_UPTIME}"
      - "homepage.description=Uptime monitoring and status pages"
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:3001/api/entry-page"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


