# version: "3.8"

services:
  cloudflared:
    image: alpine:latest
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    profiles: [network]
    entrypoint: ["/bin/sh", "/entrypoint-wrapper.sh"]
    environment:
      - CLOUDFLARED_VERSION=latest
    volumes:
      - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
      - cloudflared_bin:/data
    networks:
      - proxy
    secrets:
      - cf_tunnel_token
    labels:
      - "homepage.group=Network"
      - "homepage.name=Cloudflare Tunnel"
      - "homepage.icon=cloudflare.png"
      - "homepage.href=https://dash.cloudflare.com"
      - "homepage.description=Cloudflare tunnel for external access"


