version: "3.8"

services:
  cloudflared:
    image: alpine:latest
    container_name: cloudflared
    restart: unless-stopped
    profiles: [network]
    entrypoint: ["/bin/sh", "/entrypoint-wrapper.sh"]
    environment:
      - CLOUDFLARED_VERSION=latest
    volumes:
      - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
      - cloudflared_bin:/data
    networks:
      - proxy
    secrets:
      - cf_tunnel_token
    labels:
      - "homepage.group=Network"
      - "homepage.name=Cloudflare Tunnel"
      - "homepage.icon=cloudflare.png"
      - "homepage.description=Cloudflare tunnel for external access"

volumes:
  cloudflared_bin:

networks:
  proxy:
    external: true
