version: "3.8"

services:
  # --- 1. THE AGENT ---
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    command: gateway run
    restart: unless-stopped
#    profiles: [ai]
    stdin_open: true
    tty: true
    environment:
      HERMES_HOME: /home/hermes/.hermes
      HERMES_UID: "1000"
      HERMES_GID: "1000"
      GATEWAY_ALLOW_ALL_USERS: "true"
      HERMES_DASHBOARD_INSECURE: "1"
# --- ACTIVATES THE API SERVER ---
      API_SERVER_ENABLED: "true"
      API_SERVER_PORT: "8642"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: "your-super-secret-key-here" # Create any key you want
    volumes:
      - hermes_home:/home/hermes/.hermes
      - hermes_agent_src:/opt/hermes
    ports:
      - "127.0.0.1:8642:8642" # Exposes the API endpoint to your host     network
    networks:
      - ai-ml
      - agent-communication
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /home/hermes/.hermes/gateway_state.json && python3 -c \"import json; d=json.load(open('/home/hermes/.hermes/gateway_state.json')); exit(0 if d.get('gateway_state')=='running' else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --- 2. THE WEB UI ---
  hermes:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes
    restart: unless-stopped
#    profiles: [ai]
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["/hermeswebui_init.bash"]
    depends_on:
      hermes-agent:
        condition: service_healthy
    environment:
      HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
      HERMES_WEBUI_HOST: "0.0.0.0"
      HERMES_WEBUI_PORT: "8787"
      WANTED_UID: "1000"
      WANTED_GID: "1000"
      HERMES_AGENT_HOST: "hermes-agent"
      HERMES_WEBUI_AGENT_DIR: "/home/hermeswebui/.hermes/hermes-agent"
    volumes:
      - hermes_home:/home/hermeswebui/.hermes
      # This line maps the source directly from the other volume so Python can find it!
      - hermes_agent_src:/home/hermeswebui/.hermes/hermes-agent:ro
      - hermes_workspace:/workspace
      - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    ports:
      - "127.0.0.1:${PORT_HERMES}:8787"
    networks:
      - proxy
      - ai-ml
      - agent-communication
    secrets:
      - hermes_password
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=Hermes"
      - "homepage.icon=hermes.png"
      - "homepage.href=http://localhost:${PORT_HERMES}"
      - "homepage.description=Self-hosted AI Agent with Memory & Tools"
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`hermes.${DOMAIN}`)"
      - "traefik.http.routers.hermes.entrypoints=websecure"
      - "traefik.http.routers.hermes.tls.certresolver=cloudflare"
      - "traefik.http.services.hermes.loadbalancer.server.port=8787"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true
  ai-ml:
    external: true
  agent-communication:
    external: true

volumes:
  # Changing these from 'external: true' to local lets this file manage them cleanly together
  hermes_home:
  hermes_agent_src:
  hermes_workspace:

secrets:
  hermes_password:
    file: ../../../secrets/hermes_password.txt