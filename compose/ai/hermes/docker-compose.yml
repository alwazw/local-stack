version: "3.8"

services:
  hermes:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes
    restart: unless-stopped
    profiles: [ai]
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["/hermeswebui_init.bash"]
    depends_on:
      - hermes-agent
    environment:
      HERMES_WEBUI_STATE_DIR: /home/hermeswebui/.hermes/webui
      HERMES_WEBUI_HOST: "0.0.0.0"
      HERMES_WEBUI_PORT: "8787"
      WANTED_UID: "1000"
      WANTED_GID: "1000"
      HERMES_AGENT_HOST: "hermes-agent"
    volumes:
      - hermes_home:/home/hermeswebui/.hermes
      - hermes_agent_src:/home/hermeswebui/.hermes/hermes-agent:ro
      - hermes_workspace:/workspace
      - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    ports:
      - "127.0.0.1:${PORT_HERMES}:8787"
    networks:
      - proxy
      - ai-ml
      - agent-communication
    secrets:
      - hermes_password
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=Hermes"
      - "homepage.icon=hermes.png"
      - "homepage.href=http://localhost:${PORT_HERMES}"
      - "homepage.description=Self-hosted AI Agent with Memory & Tools"
      - "traefik.enable=true"
      - "traefik.http.routers.hermes.rule=Host(`hermes.${DOMAIN}`)"
      - "traefik.http.routers.hermes.entrypoints=websecure"
      - "traefik.http.routers.hermes.tls.certresolver=cloudflare"
      - "traefik.http.services.hermes.loadbalancer.server.port=8787"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true
  ai-ml:
    external: true
  agent-communication:
    external: true

volumes:
  hermes_home:
    external: true
  hermes_agent_src:
    external: true
  hermes_workspace:
    external: true

secrets:
  hermes_password:
    external: true
