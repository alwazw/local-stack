version: "3.8"

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    profiles: [ai]
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      WEBUI_SECRET_KEY_FILE: /run/secrets/webui_secret_key
    ports:
      - "127.0.0.1:${PORT_OPENWEBUI}:8080"
    volumes:
      - ./data:/app/backend/data
    secrets:
      - webui_secret_key
    networks:
      - proxy
      - ai-ml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`chat.${DOMAIN}`)"
      - "traefik.http.routers.openwebui.entrypoints=websecure"
      - "traefik.http.routers.openwebui.tls.certresolver=cloudflare"
      - "homepage.group=AI"
      - "homepage.name=OpenWebUI"
      - "homepage.href=https://chat.${DOMAIN}"

networks:
  proxy:
    external: true
  ai-ml:
    external: true

secrets:
  webui_secret_key:
    external: true
