# File: ~/docker/compose/ai/litellm/docker-compose.yml
services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    env_file:
      - ../../../.env
    environment:
      # LITELMM_SECRETS_KEY: "${LITELLM_MASTER_KEY_FILE}" # Not a direct value, but file path
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY_FILE}"
      # Configure your models, e.g., local Ollama, OpenAI, Groq
      # This example proxies to local Ollama
      LITELLM_MODEL: "ollama/llama3.1:8b" # Default model
      OLLAMA_API_BASE: "http://ollama:11434" # Connects to Ollama container
      DEBUG: 1 # Set to 0 for production
    ports:
      - "${PORT_LITELLM}:4000"
    volumes:
      - ./config:/app/config
    networks:
      - proxy
      - ai-ml
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=LiteLLM"
      - "homepage.icon=litellm.png"
      - "homepage.href=http://${DOMAIN}:${PORT_LITELLM}/health"
      - "homepage.description=LLM Gateway (Routing, Load Balancing, Fallback)"
      # Traefik (if exposing directly, typically agents access internal)
      # - "traefik.enable=true"
      # - "traefik.http.routers.litellm.rule=Host(`litellm.${DOMAIN}`)"
      # - "traefik.http.routers.litellm.entrypoint=websecure"
      # - "traefik.http.routers.litellm.tls.certresolver=home"
      # - "traefik.http.services.litellm.loadbalancer.server.port=4000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/routes', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

secrets:
  litellm_key:
    file: ../../../secrets/litellm_key.txt

networks:
  proxy:
    external: true
  ai-ml:
    external: true