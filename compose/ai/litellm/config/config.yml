# ====================================================================
# GATEWAY COOLDOWN, ROTATION AND HEURISTIC ROUTER SETTINGS
# ====================================================================
router_settings:
  # usage-based-routing minimizes RPM utilization and balances active load across nodes.
  routing_strategy: usage-based-routing
  
  # Number of retries attempted within a priority band before escalating up the order ladder.
  num_retries: 3
  
  # Quarantines a failing key/endpoint for 60 seconds upon a 429 response.
  cooldown_time: 60
  allowed_fails: 1

  # Local pre-call rate check blocks request dispatching if token limits are saturated.
  optional_pre_call_checks:
    - enforce_model_rate_limits

  # ====================================================================
  # COHESIVE SYSTEM ALIAS & TYPO MITIGATION LAYER
  # Resolves framework-specific requests directly to our optimized pools.
  # ====================================================================
  model_group_alias:
    # -- Agent Zero Typo Handling --
    "openai/morpheus-utitlity-model": "openai/morpheus-utility-model"
    "openai/morpheus-embeding-model": "openai/morpheus-embedding-model"
    # -- Agent Zero Core Redirection --
    "openai/morpheus-main-tier2": "openai/morpheus-main-model"
    "openai/morpheus-utility-tier2": "openai/morpheus-utility-model"
    "openai/morpheus-omni-free": "openai/morpheus-utility-model"
    "openai/morpheus-openrouter-free": "openai/morpheus-main-model"
    "openai/morpheus-local-fallback": "openai/morpheus-main-model"
    # -- Hermes Agent Specific Slot Mappings --
    "gemini-2.5-pro": "openai/morpheus-main-model"
    "gemini-2.5-flash": "openai/morpheus-utility-model"
    "google/gemini-2.5-flash": "openai/morpheus-utility-model"
    "anthropic/claude-opus-4.7": "openai/morpheus-main-model"
    "nousresearch/hermes-3-llama-3.1-405b:free": "openai/morpheus-main-model"
    "openrouter/google/gemini-2.5-flash:free": "openai/morpheus-utility-model"
    "ollama/nomic-embed-text": "openai/morpheus-embedding-model"

  # ====================================================================
  # GROUP-TO-GROUP ESCALATION FAILOVERS
  # Executed only if an entire group's order-based roster is exhausted.
  # ====================================================================
  fallbacks:
    - "openai/morpheus-main-model": ["openai/morpheus-utility-model"]
    - "openai/morpheus-embedding-model": ["openai/morpheus-utility-model"]

# ====================================================================
# ADVANCED ENGINE GLOBAL SETTINGS
# ====================================================================
litellm_settings:
  # drop_params strips custom framework settings to prevent upstream JSON errors.
  drop_params: true
  set_verbose: false