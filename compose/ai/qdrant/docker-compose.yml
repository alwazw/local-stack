# version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    profiles: [ai]
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:${PORT_QDRANT:-6333}:6333"
    networks:
      - proxy
      - ai-ml
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qdrant.rule=Host(`qdrant.${DOMAIN}`)"
      - "traefik.http.routers.qdrant.entrypoints=websecure"
      - "traefik.http.routers.qdrant-web.entrypoints=web"
      - "traefik.http.routers.qdrant-web.rule=Host(`qdrant.${DOMAIN}`)"
      - "traefik.http.routers.qdrant.tls.certresolver=cloudflare"
      - "traefik.http.services.qdrant.loadbalancer.server.port=6333"
      - "homepage.group=AI"
      - "homepage.name=Qdrant"
      - "homepage.icon=qdrant.png"
      - "homepage.href=https://qdrant.${DOMAIN}/dashboard"
      - "homepage.description=Vector Database for embeddings"

networks:
  proxy:
    external: true
  ai-ml:
    external: true

volumes:
  qdrant_data:
    external: true
