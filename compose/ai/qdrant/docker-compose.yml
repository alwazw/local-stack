# Qdrant — Vector Database for Agent Zero embeddings
# Profile: ai
# Network: ai-ml
# Secrets: none
# Port: 6333 (localhost only)
services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    profiles: [ai]
    volumes:
      - ./compose/ai/qdrant/data:/qdrant/storage
    ports:
      - "127.0.0.1:${PORT_QDRANT:-6333}:6333"
      - "127.0.0.1:6334:6334"
    networks:
      - ai-ml
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "homepage.group=AI"
      - "homepage.name=Qdrant"
      - "homepage.icon=qdrant.png"
      - "homepage.href=http://localhost:${PORT_QDRANT:-6333}/dashboard"
      - "homepage.description=Vector Database for embeddings"
