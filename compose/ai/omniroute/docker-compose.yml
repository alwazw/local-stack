# version: "3.8"

services:
  omniroute:
    image: diegosouzapw/omniroute:latest
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    profiles: [ai]
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["node", "dev/run-standalone.mjs"]
    volumes:
      - ./entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
    networks:
      - ai-ml
      - proxy
    secrets:
      - redis_password


