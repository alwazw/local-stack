version: "3.8"

services:
  mcpo:
    image: ghcr.io/open-webui/mcpo:latest
    container_name: mcpo
    restart: unless-stopped
    profiles: [ai]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--config"
      - "/app/config.json"
      - "--hot-reload"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./filesystem_server.py:/app/filesystem_server.py:ro
      - ./git_server.py:/app/git_server.py:ro
      - ../../../projects:/workspace
    ports:
      - "127.0.0.1:${PORT_MCPO}:8000"
    networks:
      - ai-ml
    labels:
      - "homepage.group=AI Core"
      - "homepage.name=MCPO"
      - "homepage.icon=mcpo.png"
      - "homepage.href=http://${DOMAIN}:${PORT_MCPO}/docs"
      - "homepage.description=MCP-to-OpenAPI Bridge"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  ai-ml:
    external: true
