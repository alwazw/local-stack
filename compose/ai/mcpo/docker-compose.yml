# version: "3.8"

services:
  mcpo:
    image: ghcr.io/open-webui/mcpo:latest
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    profiles: [ai]
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--config"
      - "/app/config.json"
      - "--hot-reload"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./filesystem_server.py:/app/filesystem_server.py:ro
      - ./git_server.py:/app/git_server.py:ro
      - ../../../projects:/workspace
    ports:
      - "127.0.0.1:${PORT_MCPO}:8000"
    networks:
      - proxy
      - ai-ml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mcpo.rule=Host(`mcpo.${DOMAIN}`)"
      - "traefik.http.routers.mcpo.entrypoints=websecure"
      - "traefik.http.routers.mcpo-web.entrypoints=web"
      - "traefik.http.routers.mcpo-web.rule=Host(`mcpo.${DOMAIN}`)"
      - "traefik.http.routers.mcpo.tls.certresolver=cloudflare"
      - "traefik.http.services.mcpo.loadbalancer.server.port=8000"
      - "homepage.group=AI Core"
      - "homepage.name=MCPO"
      - "homepage.icon=mcpo.png"
      - "homepage.href=https://mcpo.${DOMAIN}/docs"
      - "homepage.description=MCP-to-OpenAPI Bridge"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

