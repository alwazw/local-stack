# Woodpecker CI — Continuous Integration server
# Profile: ci
# Network: proxy
# Port: 8001
# Depends: gitea (for auth), postgres (for storage)
services:
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:latest
    container_name: woodpecker-server
    restart: unless-stopped
    profiles: [ci]
    environment:
      WOODPECKER_OPEN: "true"
      WOODPECKER_HOST: "https://ci.${DOMAIN}"
      WOODPECKER_GITEA: "true"
      WOODPECKER_GITEA_URL: "https://gitea.${DOMAIN}"
      WOODPECKER_AGENT_SECRET_FILE: /run/secrets/gitea_secret
      WOODPECKER_DATABASE_BACKEND: postgres
      WOODPECKER_DATABASE_DATASOURCE: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/woodpecker?sslmode=disable"
    volumes:
      - woodpecker_data:/var/lib/woodpecker
    ports:
      - "127.0.0.1:${PORT_WOODPECKER:-8001}:8000"
    networks:
      - proxy
      - database
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.woodpecker.rule=Host(`ci.${DOMAIN}`)"
      - "traefik.http.routers.woodpecker.entrypoints=websecure"
      - "traefik.http.routers.woodpecker.tls.certresolver=cloudflare"
      - "traefik.http.services.woodpecker.loadbalancer.server.port=8000"
      - "homepage.group=CI/CD"
      - "homepage.name=Woodpecker"
      - "homepage.icon=woodpecker.png"
      - "homepage.href=https://ci.${DOMAIN}"
      - "homepage.description=Continuous Integration server"

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:latest
    container_name: woodpecker-agent
    restart: unless-stopped
    profiles: [ci]
    environment:
      WOODPECKER_SERVER: "woodpecker-server:9000"
      WOODPECKER_AGENT_SECRET_FILE: /run/secrets/gitea_secret
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    depends_on:
      - woodpecker-server
