version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    profiles: [ci]
    environment:
      N8N_HOST: "n8n.${DOMAIN}"
      N8N_PROTOCOL: "https"
      N8N_EDITOR_BASE_URL: "https://n8n.${DOMAIN}/"
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_key
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:${PORT_N8N:-5678}:5678"
    networks:
      - proxy
      - database
    secrets:
      - n8n_key
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=cloudflare"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"
      - "homepage.group=CI/CD"
      - "homepage.name=n8n"
      - "homepage.icon=n8n.png"
      - "homepage.href=https://n8n.${DOMAIN}"
      - "homepage.description=Workflow automation platform"

networks:
  proxy:
    external: true
  database:
    external: true

volumes:
  n8n_data:
    external: true
