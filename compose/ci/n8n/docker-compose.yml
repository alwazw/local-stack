# version: "3.8"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    profiles: [ci]
    environment:
      N8N_HOST: "n8n.${DOMAIN}"
      N8N_PROTOCOL: "https"
      N8N_EDITOR_BASE_URL: "https://n8n.${DOMAIN}/"
      N8N_ENCRYPTION_KEY_FILE: /run/secrets/n8n_key
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "127.0.0.1:${PORT_N8N:-5678}:5678"
    networks:
      - proxy
      - database
    secrets:
      - n8n_key
      - postgres_password


